<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foto → PDF Laporan Instalasi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy-950:#0a1326;
    --navy-800:#142544;
    --navy-700:#1c3157;
    --blue-500:#2f6fed;
    --paper:#f3f5f9;
    --card:#ffffff;
    --line:#e4e8f1;
    --line-soft:#edf0f6;
    --muted:#6e7790;
    --muted-2:#9aa2b8;
    --radius-lg:16px;
    --radius-sm:8px;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    font-family:var(--font);
    background:var(--paper);
    color:#101a30;
    margin:0;
    padding:20px;
    font-size:14px;
  }
  /* Topbar & Layout */
  .topbar{
    background:var(--card);
    border-bottom:1px solid var(--line);
    padding:16px 28px;
    margin-bottom:20px;
    border-radius:var(--radius-sm);
  }
  .topbar h1{ font-size:18px; margin:0; letter-spacing:-.2px; }
  .topbar .crumbs{ font-size:12px; color:var(--muted); margin-top:2px; }
  .view-inner { padding: 10px 0; }

  /* Grid Layout */
  .grid-container {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
  }

  /* Form & Fields */
  .field { margin-bottom: 0; }
  .field label{
    display:block;
    font-size:11.5px;
    font-weight:700;
    color:var(--navy-700);
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:.3px;
  }
  .field input{
    width:100%;
    padding:10px 12px;
    border:1.4px solid var(--line);
    border-radius:var(--radius-sm);
    font-size:13.5px;
    background:#fafbfd;
    outline:none;
  }
  .field input:focus{ border-color:var(--blue-500); background:#fff; }

  /* Buttons */
  .btn{
    border:none;
    border-radius:var(--radius-sm);
    padding:12px 15px;
    font-size:13px;
    font-weight:600;
    display:inline-flex;
    align-items:center;
    gap:7px;
    justify-content:center;
    cursor:pointer;
  }
  .btn-primary{ background:var(--navy-950); color:#fff; }
  .btn-primary:hover{ background:var(--navy-800); }

  .photo-group-box {
    background: var(--card);
    border-radius: 9px;
    padding: 12px;
    margin-bottom: 12px;
    border: 1px solid var(--line);
  }

  /* Responsive Mobile */
  @media (max-width: 768px) {
    .grid-container { grid-template-columns: 1fr; }
    body { padding: 10px; }
    .topbar { padding: 14px; }
  }
</style>
</head>
<body>

  <div class="view" id="view-pdf-instalasi">
    <div class="topbar">
      <div>
        <h1>Foto → PDF Laporan Instalasi</h1>
        <div class="crumbs">Gabungkan foto hasil instalasi menjadi PDF terstruktur berjejer kiri dan kanan</div>
      </div>
    </div>
    
    <div class="view-inner">
      <div class="grid-container">

        <div style="display:flex;flex-direction:column;gap:16px;">
          <div>
            <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:12px;">1. Info Lengkap Laporan</div>
            <div style="background:var(--card);border:1px solid var(--line);border-radius:var(--radius-lg);padding:18px;display:flex;flex-direction:column;gap:12px;">
              <div class="field">
                <label>Kegiatan / Nama Customer</label>
                <input type="text" id="pdfTitle" placeholder="mis. Laporan Instalasi Perangkat - Toko Budi Jaya">
              </div>
              <div class="field">
                <label>Lokasi / Alamat</label>
                <input type="text" id="custAddress" placeholder="mis. Jl. Mawar No.12, Jakarta Selatan">
              </div>
              <div class="field">
                <label>Tanggal Instalasi</label>
                <input type="date" id="installDate">
              </div>
              <div class="field">
                <label>Teknisi</label>
                <input type="text" id="techName" placeholder="mis. Budi Santoso">
              </div>
            </div>
          </div>

          <div>
            <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:12px;">2. Alur Tambah Foto per Subjudul</div>
            <div style="background:var(--card);border:1px solid var(--line);border-radius:var(--radius-lg);padding:18px;display:flex;flex-direction:column;gap:14px;">
              
              <div class="field">
                <label>Tulis Subjudul Kelompok Foto Ini</label>
                <input type="text" id="currentSubtitleInput" placeholder="mis. Progress Sebelum Instalasi / Selesai Pasang" value="Foto Instalasi">
              </div>

              <div class="field">
                <label>Pilih File Foto</label>
                <input type="file" id="fileInput" multiple accept="image/*" onchange="handleFileSelect(event)">
              </div>
            </div>
          </div>
        </div>

        <div>
          <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:12px;">3. Preview Pengelompokan Subjudul & Gambar</div>
          <div id="photoPreviewContainer" style="background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-lg);padding:14px;margin-bottom:14px;display:flex;flex-direction:column;min-height:180px;justify-content:flex-start;">
            <div id="emptyState" style="font-size:12.5px;color:var(--muted-2);text-align:center;padding:40px 0;margin:auto 0;">Belum ada data foto kelompok. Pilih foto dari panel kiri.</div>
          </div>

          <button class="btn btn-primary" style="width:100%;" onclick="generatePDF()">
            ⬇ Generate & Download PDF
          </button>
        </div>

      </div>
    </div>
  </div>

  <script>
    let structuredGroups = [];

    // Fungsi menangani input foto yang super aman
    function handleFileSelect(event) {
      const files = event.target.files;
      if (!files.length) return;

      let currentSubtitle = document.getElementById('currentSubtitleInput').value.trim();
      if (!currentSubtitle) { currentSubtitle = "Foto Instalasi"; }
      
      document.getElementById('emptyState').style.display = 'none';

      let targetGroup = structuredGroups.find(g => g.subtitle.toLowerCase() === currentSubtitle.toLowerCase());
      if (!targetGroup) {
        targetGroup = { subtitle: currentSubtitle, images: [] };
        structuredGroups.push(targetGroup);
      }

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const reader = new FileReader();
        
        reader.onload = function(e) {
          const img = new Image();
          img.src = e.target.result;
          img.onload = function() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const maxW = 800;
            let width = img.width;
            let height = img.height;
            
            if (width > maxW) {
              height = Math.round((height * maxW) / width);
              width = maxW;
            }
            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);
            
            targetGroup.images.push({
              name: file.name,
              base64: canvas.toDataURL('image/jpeg', 0.7),
              aspect: width / height
            });
            renderPreviews();
          };
        };
        reader.readAsDataURL(file);
      }
    }

    function renderPreviews() {
      const container = document.getElementById('photoPreviewContainer');
      container.querySelectorAll('.photo-group-box').forEach(item => item.remove());

      structuredGroups.forEach((group, groupIdx) => {
        if(group.images.length === 0) return;
        const groupEl = document.createElement('div');
        groupEl.className = 'photo-group-box';
        
        let html = `<div style="font-weight:700; color:var(--navy-700); margin-bottom:8px;">Kelompok: ${group.subtitle}</div>`;
        group.images.forEach((img, imgIdx) => {
          html += `<div style="font-size:12px; margin-bottom:4px; color:#555;">✓ ${img.name}</div>`;
        });
        groupEl.innerHTML = html;
        container.appendChild(groupEl);
      });
    }

    // Fungsi PDF yang mandiri & kebal error database
    function generatePDF() {
      if (structuredGroups.length === 0) {
        alert("Silakan pilih foto terlebih dahulu!");
        return;
      }

      // Jalankan proses Supabase di latar belakang secara senyap agar tidak merusak tombol cetak PDF
      try {
        const url = window.env?.VITE_SUPABASE_URL || import.meta?.env?.VITE_SUPABASE_URL || '';
        const key = window.env?.VITE_SUPABASE_ANON_KEY || import.meta?.env?.VITE_SUPABASE_ANON_KEY || '';
        if (typeof supabase !== 'undefined' && url && key) {
          const client = supabase.createClient(url, key);
          client.from('laporan_instalasi').insert([{
            nama_teknisi: document.getElementById('techName').value || 'Anonim',
            lokasi: document.getElementById('custAddress').value || 'Tanpa Lokasi',
            keterangan: document.getElementById('pdfTitle').value || 'Laporan Instalasi'
          }]).then(() => console.log("Data terkirim ke DB"));
        }
      } catch(e) {}

      // Cetak PDF utama
      try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(16);
        doc.text(document.getElementById('pdfTitle').value || 'LAPORAN INSTALASI', 14, 20);
        
        let currentY = 30;
        structuredGroups.forEach(group => {
          doc.setFontSize(12);
          doc.text(group.subtitle, 14, currentY);
          currentY += 10;

          group.images.forEach(img => {
            if(currentY + 60 > 280) { doc.addPage(); currentY = 20; }
            try {
              doc.addImage(img.base64, 'JPEG', 14, currentY, 80, 50);
              currentY += 55;
            } catch(e){}
          });
        });

        doc.save('Laporan_Instalasi.pdf');
      } catch(err) {
        alert("Gagal membuat PDF. Pastikan koneksi internet Anda lancar untuk memuat pustaka PDF.");
      }
    }
  </script>
</body>
</html>
